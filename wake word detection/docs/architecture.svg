<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14">
  <defs>
    <linearGradient id="board" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#0b4ec1"/>
    </linearGradient>
    <linearGradient id="host" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2ea043"/>
      <stop offset="1" stop-color="#1a7f37"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f6f8fa"/>

  <!-- Title -->
  <text x="480" y="38" font-size="22" font-weight="700" text-anchor="middle" fill="#0d1117">
    Hey-Jarvis — System Architecture
  </text>
  <text x="480" y="60" text-anchor="middle" fill="#57606a">
    Offline wake-word detection on Arduino Nano 33 BLE Sense
  </text>

  <!-- Host PC pane -->
  <rect x="30" y="90" width="280" height="420" rx="14" fill="white" stroke="#d0d7de" filter="url(#shadow)"/>
  <rect x="30" y="90" width="280" height="38" rx="14" fill="url(#host)"/>
  <text x="170" y="115" font-size="16" font-weight="700" fill="white" text-anchor="middle">Host PC — Training</text>

  <g transform="translate(50,150)" fill="#0d1117">
    <rect width="240" height="42" rx="8" fill="#dafbe1" stroke="#2ea043"/>
    <text x="120" y="26" text-anchor="middle" font-weight="600">Record + collect audio</text>
    <text x="120" y="36" text-anchor="middle" font-size="11" fill="#1a7f37">record_samples.py · prepare_dataset.py</text>
  </g>
  <g transform="translate(50,210)" fill="#0d1117">
    <rect width="240" height="42" rx="8" fill="#dafbe1" stroke="#2ea043"/>
    <text x="120" y="26" text-anchor="middle" font-weight="600">MFCC + augmentation</text>
    <text x="120" y="36" text-anchor="middle" font-size="11" fill="#1a7f37">features.py · augment.py</text>
  </g>
  <g transform="translate(50,270)" fill="#0d1117">
    <rect width="240" height="42" rx="8" fill="#dafbe1" stroke="#2ea043"/>
    <text x="120" y="26" text-anchor="middle" font-weight="600">DS-CNN training (Keras)</text>
    <text x="120" y="36" text-anchor="middle" font-size="11" fill="#1a7f37">model.py · train.py</text>
  </g>
  <g transform="translate(50,330)" fill="#0d1117">
    <rect width="240" height="42" rx="8" fill="#dafbe1" stroke="#2ea043"/>
    <text x="120" y="26" text-anchor="middle" font-weight="600">Int8 quantisation</text>
    <text x="120" y="36" text-anchor="middle" font-size="11" fill="#1a7f37">convert.py → .tflite</text>
  </g>
  <g transform="translate(50,390)" fill="#0d1117">
    <rect width="240" height="42" rx="8" fill="#dafbe1" stroke="#2ea043"/>
    <text x="120" y="26" text-anchor="middle" font-weight="600">C array export</text>
    <text x="120" y="36" text-anchor="middle" font-size="11" fill="#1a7f37">model.cpp / model.h</text>
  </g>
  <g transform="translate(50,450)" fill="#0d1117">
    <rect width="240" height="42" rx="8" fill="#eef0f2" stroke="#9ea7b3"/>
    <text x="120" y="26" text-anchor="middle" font-weight="600">Flash via Arduino IDE</text>
    <text x="120" y="36" text-anchor="middle" font-size="11" fill="#57606a">USB upload</text>
  </g>

  <!-- USB arrow -->
  <line x1="310" y1="471" x2="370" y2="471" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="463" text-anchor="middle" font-size="11" fill="#57606a">USB</text>

  <!-- Device pane -->
  <rect x="370" y="90" width="560" height="420" rx="14" fill="white" stroke="#d0d7de" filter="url(#shadow)"/>
  <rect x="370" y="90" width="560" height="38" rx="14" fill="url(#board)"/>
  <text x="650" y="115" font-size="16" font-weight="700" fill="white" text-anchor="middle">Arduino Nano 33 BLE Sense — On-Device</text>

  <!-- Mic -->
  <g transform="translate(395,160)">
    <rect width="120" height="60" rx="8" fill="#ddf4ff" stroke="#0969da"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">PDM Mic</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#0a3069">MP34DT05 · 16 kHz</text>
  </g>

  <!-- Ring buffer -->
  <g transform="translate(545,160)">
    <rect width="120" height="60" rx="8" fill="#fff8c5" stroke="#bf8700"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">Ring buffer</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#6e5400">SPSC · 4 × clip</text>
  </g>

  <!-- MFCC -->
  <g transform="translate(695,160)">
    <rect width="120" height="60" rx="8" fill="#fbefff" stroke="#8250df"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">MFCC</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#4a1e8a">CMSIS-DSP · 49×40</text>
  </g>

  <!-- TFLite Micro -->
  <g transform="translate(545,260)">
    <rect width="120" height="60" rx="8" fill="#ffe9e1" stroke="#cf222e"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">TFLite Micro</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#82071e">int8 DS-CNN</text>
  </g>

  <!-- Recognizer -->
  <g transform="translate(395,260)">
    <rect width="120" height="60" rx="8" fill="#dafbe1" stroke="#1a7f37"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">Recognizer</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#0c3919">sliding-window avg</text>
  </g>

  <!-- Responder -->
  <g transform="translate(695,260)">
    <rect width="120" height="60" rx="8" fill="#fff1e5" stroke="#bc4c00"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">Responder</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#7a3000">LED + Serial</text>
  </g>

  <!-- Hardware outputs -->
  <g transform="translate(420,360)">
    <rect width="120" height="60" rx="8" fill="#f6f8fa" stroke="#57606a"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">Onboard LED</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#57606a">800 ms blink</text>
  </g>
  <g transform="translate(580,360)">
    <rect width="120" height="60" rx="8" fill="#f6f8fa" stroke="#57606a"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">Serial</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#57606a">115200 baud</text>
  </g>
  <g transform="translate(740,360)">
    <rect width="120" height="60" rx="8" fill="#eef0f2" stroke="#9ea7b3" stroke-dasharray="4 3"/>
    <text x="60" y="26" text-anchor="middle" font-weight="700">BLE (optional)</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" fill="#57606a">extensible hook</text>
  </g>

  <!-- Arrows -->
  <line x1="515" y1="190" x2="540" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="665" y1="190" x2="690" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="755" y1="220" x2="640" y2="258" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="545" y1="290" x2="520" y2="290" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="515" y1="290" x2="540" y2="290" stroke="#374151" stroke-width="2" stroke-dasharray="3 3"/>
  <line x1="455" y1="320" x2="475" y2="358" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="320" x2="640" y2="358" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="320" x2="800" y2="358" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="455" y1="320" x2="730" y2="280" stroke="transparent"/>

  <!-- Legend -->
  <g transform="translate(395,440)">
    <text font-size="12" fill="#57606a">Edge inference runs entirely on the nRF52840 Cortex-M4F — no Wi-Fi, no cloud, ~50 ms per inference.</text>
  </g>
</svg>
