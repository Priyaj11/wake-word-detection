<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#f6f8fa"/>

  <text x="540" y="36" font-size="20" font-weight="700" text-anchor="middle" fill="#0d1117">
    Audio Pipeline (per inference)
  </text>

  <!-- Stage boxes -->
  <g transform="translate(30,90)">
    <rect width="150" height="100" rx="10" fill="#ddf4ff" stroke="#0969da" filter="url(#s)"/>
    <text x="75" y="32" font-weight="700" text-anchor="middle">1. PDM Capture</text>
    <text x="75" y="56" text-anchor="middle">16 kHz int16</text>
    <text x="75" y="74" text-anchor="middle" font-size="11" fill="#0a3069">1000 ms window</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#0a3069">250 ms stride</text>
  </g>

  <g transform="translate(210,90)">
    <rect width="150" height="100" rx="10" fill="#fff8c5" stroke="#bf8700" filter="url(#s)"/>
    <text x="75" y="32" font-weight="700" text-anchor="middle">2. Pre-emphasis</text>
    <text x="75" y="56" text-anchor="middle">α = 0.97</text>
    <text x="75" y="74" text-anchor="middle" font-size="11" fill="#6e5400">+ Hamming window</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#6e5400">30 ms / 20 ms hop</text>
  </g>

  <g transform="translate(390,90)">
    <rect width="150" height="100" rx="10" fill="#fbefff" stroke="#8250df" filter="url(#s)"/>
    <text x="75" y="32" font-weight="700" text-anchor="middle">3. FFT</text>
    <text x="75" y="56" text-anchor="middle">arm_rfft_fast_f32</text>
    <text x="75" y="74" text-anchor="middle" font-size="11" fill="#4a1e8a">N = 512</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#4a1e8a">power spectrum</text>
  </g>

  <g transform="translate(570,90)">
    <rect width="150" height="100" rx="10" fill="#dafbe1" stroke="#1a7f37" filter="url(#s)"/>
    <text x="75" y="32" font-weight="700" text-anchor="middle">4. Mel + log</text>
    <text x="75" y="56" text-anchor="middle">40 triangular bins</text>
    <text x="75" y="74" text-anchor="middle" font-size="11" fill="#0c3919">20–4000 Hz</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#0c3919">log(energy + ε)</text>
  </g>

  <g transform="translate(750,90)">
    <rect width="150" height="100" rx="10" fill="#ffe9e1" stroke="#cf222e" filter="url(#s)"/>
    <text x="75" y="32" font-weight="700" text-anchor="middle">5. DCT-II</text>
    <text x="75" y="56" text-anchor="middle">40 MFCCs / frame</text>
    <text x="75" y="74" text-anchor="middle" font-size="11" fill="#82071e">49 frames total</text>
    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#82071e">int8 quantise</text>
  </g>

  <g transform="translate(930,90)">
    <rect width="120" height="100" rx="10" fill="#fff1e5" stroke="#bc4c00" filter="url(#s)"/>
    <text x="60" y="32" font-weight="700" text-anchor="middle">6. TFLM</text>
    <text x="60" y="56" text-anchor="middle">DS-CNN</text>
    <text x="60" y="74" text-anchor="middle" font-size="11" fill="#7a3000">int8 inference</text>
    <text x="60" y="90" text-anchor="middle" font-size="11" fill="#7a3000">softmax × 2</text>
  </g>

  <!-- Arrows between stages -->
  <g stroke="#374151" stroke-width="2" fill="none">
    <line x1="180" y1="140" x2="210" y2="140" marker-end="url(#arr)"/>
    <line x1="360" y1="140" x2="390" y2="140" marker-end="url(#arr)"/>
    <line x1="540" y1="140" x2="570" y2="140" marker-end="url(#arr)"/>
    <line x1="720" y1="140" x2="750" y2="140" marker-end="url(#arr)"/>
    <line x1="900" y1="140" x2="930" y2="140" marker-end="url(#arr)"/>
  </g>

  <!-- Post-processing -->
  <g transform="translate(310,230)">
    <rect width="200" height="80" rx="10" fill="#eef0f2" stroke="#57606a" filter="url(#s)"/>
    <text x="100" y="30" font-weight="700" text-anchor="middle">7. Sliding-window smoother</text>
    <text x="100" y="50" text-anchor="middle" font-size="11" fill="#57606a">average score over 1 s</text>
    <text x="100" y="66" text-anchor="middle" font-size="11" fill="#57606a">min 2 detections in window</text>
  </g>
  <g transform="translate(560,230)">
    <rect width="200" height="80" rx="10" fill="#eef0f2" stroke="#57606a" filter="url(#s)"/>
    <text x="100" y="30" font-weight="700" text-anchor="middle">8. Threshold + suppression</text>
    <text x="100" y="50" text-anchor="middle" font-size="11" fill="#57606a">threshold ≥ 0.90</text>
    <text x="100" y="66" text-anchor="middle" font-size="11" fill="#57606a">cooldown 1.5 s</text>
  </g>
  <g transform="translate(810,230)">
    <rect width="200" height="80" rx="10" fill="#fff1e5" stroke="#bc4c00" filter="url(#s)"/>
    <text x="100" y="30" font-weight="700" text-anchor="middle">9. Responder</text>
    <text x="100" y="50" text-anchor="middle" font-size="11" fill="#7a3000">LED ON 800 ms</text>
    <text x="100" y="66" text-anchor="middle" font-size="11" fill="#7a3000">Serial: "Wake word detected!"</text>
  </g>

  <g stroke="#374151" stroke-width="2" fill="none">
    <line x1="990" y1="190" x2="990" y2="220" marker-end="url(#arr)"/>
    <line x1="990" y1="220" x2="510" y2="240" stroke="transparent"/>
    <line x1="990" y1="220" x2="410" y2="220" />
    <line x1="410" y1="220" x2="410" y2="230" marker-end="url(#arr)"/>
    <line x1="510" y1="270" x2="560" y2="270" marker-end="url(#arr)"/>
    <line x1="760" y1="270" x2="810" y2="270" marker-end="url(#arr)"/>
  </g>

  <text x="540" y="338" text-anchor="middle" font-size="12" fill="#57606a">
    Stages 1–6 run on every loop iteration. Stages 7–9 maintain state across iterations.
  </text>
</svg>
